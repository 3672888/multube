	if(true || location.hostname == "kazuprog.work"){
		const f = new FormData();

		f.append("url",		location.href);

<header>
	<span>MulTube Player</span>
	<div>
		<button class="live_hide" onclick="sync()">同期(ズレ:<span id="zure"></span>s)</button>
		<button id="settings_btn" onclick="openSettings()">設定</button>
	</div>
</header>

<div id="players"></div>

<div id="controls">
	<button class="live_hide" onclick="seekTo(-600)">&lt;10m</button>
	<button class="live_hide" onclick="seekTo(- 60)">&lt; 1m</button>
	<button class="live_hide" onclick="seekTo(-  5)">&lt; 5s</button>
	<button onclick="toggle( )">Play/Pause</button>
	<button class="live_hide" onclick="seekTo(   5)"> 5s&gt;</button>
	<button class="live_hide" onclick="seekTo(  60)"> 1m&gt;</button>
	<button class="live_hide" onclick="seekTo( 600)">10m&gt;</button>
</div>

<div id="settings">
	<div>
		<center><span style="font-size:1.5rem;">設定</span></center>
		<span style="font-size:1.2rem;">動画リスト</span><br>
		<table id="videoList" style="margin-left:1rem;">
			<tr><th>動画ID</th><th>時間</th><th>音量</th></tr>
		</table>
		<button onclick="saveTiming()">現在のタイミングに合わせる</button>
		<div style="text-align:right"><button onclick="share()">共有</button></div>
		<br>
		<label for="live_mode">
			<input type="checkbox" id="live_mode">
			ライブ配信モード
		</label><br>
		画質設定：
		<select id="quality">
			<option value="default">自動
			<option value="highres">最高画質
			<option value="hd1080">1080p
			<option value="hd720">720p
			<option value="large">480p
			<option value="medium">360p
			<option value="small">240p
		</select><br>
		再生位置：<input style="width:4rem" id="offset" type="number">秒<br>
		自動同期：<input style="width:4rem" id="auto-sync" type="number">秒<br>
		<br>
		<a href="./usage.html" target="_blank">使い方</a>
		　<a href="./history.html" target="_blank">更新履歴</a>
		　<a href="/" target="_blank">トップページ</a><br>
		<br>
		<div style="text-align:right">
			<button style="background:#f77" onclick="reset()">リセット</button>
			<button onclick="closeSettings()">閉じる</button>
		</div>
	</div>
</div>

<div id="overlay" class="hidden">
	<span>Loading...</span>
</div>

<script>
	window.addEventListener('load',()=>{
		onloadListener();
	})
</script>
